[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[project]
dependencies = [
    "click>=8.0",
    "overture-schema-system",
    "pyspark>=3.4",
]
description = "PySpark validation expressions for Overture Maps data"
dynamic = ["version"]
license = "MIT"
name = "overture-schema-pyspark"
requires-python = ">=3.10"

[project.scripts]
overture-validate = "overture.schema.pyspark.cli:validate_cli"

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]

[tool.hatch.version]
path = "src/overture/schema/pyspark/__about__.py"

[tool.uv.sources]
overture-schema-system = { workspace = true }
