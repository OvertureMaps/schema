[project]
maintainers = [
    {name = "Overture Maps Schema Working Group"},
]
dependencies = [
    "overture-schema-core",
    "overture-schema-system",
    "pydantic>=2.0",
]
description = "Overture Maps supplemental datasets for additional community-recognized geographic features (not part of the reference map)"
dynamic = ["version"]
license = "MIT"
name = "overture-schema-supplemental-datasets"
readme = "README.md"
requires-python = ">=3.10"

[project.urls]
Homepage = "https://overturemaps.org"
Source = "https://github.com/OvertureMaps/schema"
Issues = "https://github.com/OvertureMaps/schema/issues"

[tool.uv.sources]
overture-schema-core = { workspace = true }
overture-schema-system = { workspace = true }

[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[tool.hatch.version]
path = "src/overture/schema/supplemental/__about__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]

[project.entry-points."overture.models"]
"overture:supplemental:colloquial_area" = "overture.schema.supplemental:ColloquialArea"
