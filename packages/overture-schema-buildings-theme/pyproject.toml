[project]
maintainers = [
    {name = "Dana Bauer", email = "dana@overturemaps.org"},
    {name = "Seth Fitzsimmons"},
    {name = "Vic Schappert"},
    {name = "Jennings Anderson", email = "jenningsa@meta.com"},
]
keywords = ["schema", "pydantic", "overture", "geospatial", "validation"]
dependencies = [
    "overture-schema-core",
    "overture-schema-system",
    "pydantic>=2.0",
]
description = "Overture Maps buildings theme shared structures, building types, and building part types"
dynamic = ["version"]
license = "MIT"
name = "overture-schema-buildings-theme"
readme = "README.md"
requires-python = ">=3.10"

[project.urls]
Homepage = "https://overturemaps.org"
Source = "https://github.com/OvertureMaps/schema"
Issues = "https://github.com/OvertureMaps/schema/issues"

[tool.uv.sources]
overture-schema-core = { workspace = true }
overture-schema-system = { workspace = true }


[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[tool.hatch.version]
path = "src/overture/schema/buildings/__about__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]

[project.entry-points."overture.models"]
"overture:buildings:building" = "overture.schema.buildings:Building"
"overture:buildings:building_part" = "overture.schema.buildings:BuildingPart"
