version: '1'
datasets:
- name: infrastructure
  source_model: overture.schema.base.infrastructure.Infrastructure
  id_column: id
  rules:
  - name: infrastructure.id.not_null
    column: id
    check: not_null
    severity: error
  - name: infrastructure.id.min_length
    column: id
    check: min_length
    value: 1
    severity: error
  - name: infrastructure.id.pattern
    column: id
    check: pattern
    value: ^\S+$
    severity: error
  - name: infrastructure.geometry.not_null
    column: geometry
    check: not_null
    severity: error
  - name: infrastructure.geometry.type
    column: geometry
    check: geometry_type
    value:
    - LineString
    - MultiPolygon
    - Point
    - Polygon
    severity: error
  - name: infrastructure.version.not_null
    column: version
    check: not_null
    severity: error
  - name: infrastructure.version.gte
    column: version
    check: gte
    value: 0
    severity: error
  - name: infrastructure.sources.min_list_length
    column: sources
    check: min_list_length
    value: 1
    severity: error
  - name: infrastructure.sources.unique
    column: sources
    check: unique
    severity: error
  - name: infrastructure.sources.property.not_null
    column: sources.property
    check: not_null
    list_columns: &id001
    - sources
    when:
      column: sources
      check: not_null
    severity: error
  - name: infrastructure.sources.dataset.not_null
    column: sources.dataset
    check: not_null
    list_columns: *id001
    when:
      column: sources
      check: not_null
    severity: error
  - name: infrastructure.sources.license.pattern
    column: sources.license
    check: pattern
    value: ^(\S.*)?\S$
    list_columns:
    - sources
    severity: error
  - name: infrastructure.sources.confidence.range
    column: sources.confidence
    check: between
    value:
    - 0.0
    - 1.0
    list_columns:
    - sources
    severity: error
  - name: infrastructure.class.not_null
    column: class
    check: not_null
    severity: error
  - name: infrastructure.class.valid
    column: class
    check: in
    value:
    - aerialway_station
    - airport
    - airport_gate
    - airstrip
    - apron
    - aqueduct
    - artwork
    - atm
    - barrier
    - bell_tower
    - bench
    - bicycle_parking
    - bicycle_rental
    - block
    - boardwalk
    - bollard
    - border_control
    - breakwater
    - bridge
    - bridge_support
    - bump_gate
    - bus_route
    - bus_station
    - bus_stop
    - bus_trap
    - cable
    - cable_barrier
    - cable_car
    - cable_distribution
    - camp_site
    - cantilever
    - catenary_mast
    - cattle_grid
    - chain
    - chair_lift
    - charging_station
    - city_wall
    - communication_line
    - communication_pole
    - communication_tower
    - connection
    - cooling
    - covered
    - crossing
    - cutline
    - cycle_barrier
    - dam
    - defensive
    - ditch
    - diving
    - drag_lift
    - drain
    - drinking_water
    - entrance
    - fence
    - ferry_terminal
    - fire_hydrant
    - fountain
    - full-height_turnstile
    - gasometer
    - gate
    - generator
    - give_way
    - gondola
    - goods
    - guard_rail
    - hampshire_gate
    - handrail
    - hedge
    - height_restrictor
    - heliostat
    - helipad
    - heliport
    - hose
    - information
    - insulator
    - international_airport
    - j-bar
    - jersey_barrier
    - kerb
    - kissing_gate
    - launchpad
    - lift_gate
    - lighting
    - lightning_protection
    - magic_carpet
    - manhole
    - milestone
    - military_airport
    - minaret
    - minor_line
    - mixed_lift
    - mobile_phone_tower
    - monitoring
    - motorcycle_parking
    - motorway_junction
    - movable
    - municipal_airport
    - observation
    - parking
    - parking_entrance
    - parking_space
    - pedestrian_crossing
    - picnic_table
    - pier
    - pipeline
    - plant
    - planter
    - platform
    - platter
    - portal
    - post_box
    - power_line
    - power_pole
    - power_tower
    - private_airport
    - pylon
    - quay
    - radar
    - railway_halt
    - railway_station
    - recycling
    - regional_airport
    - reservoir_covered
    - retaining_wall
    - roller_coaster
    - rope_tow
    - runway
    - sally_port
    - seaplane_airport
    - sewer
    - silo
    - siren
    - stile
    - stop
    - stop_position
    - stopway
    - storage_tank
    - street_cabinet
    - street_lamp
    - substation
    - subway_station
    - swing_gate
    - switch
    - t-bar
    - taxilane
    - taxiway
    - terminal
    - toilets
    - toll_booth
    - traffic_signals
    - transformer
    - trestle
    - utility_pole
    - vending_machine
    - viaduct
    - viewpoint
    - wall
    - waste_basket
    - waste_disposal
    - watchtower
    - water_tower
    - weir
    - zip_line
    severity: error
  - name: infrastructure.subtype.not_null
    column: subtype
    check: not_null
    severity: error
  - name: infrastructure.subtype.valid
    column: subtype
    check: in
    value:
    - aerialway
    - airport
    - barrier
    - bridge
    - communication
    - emergency
    - manhole
    - pedestrian
    - pier
    - power
    - quay
    - recreation
    - tower
    - transit
    - transportation
    - utility
    - waste_management
    - water
    severity: error
  - name: infrastructure.height.positive
    column: height
    check: gt
    value: 0
    severity: error
  - name: infrastructure.surface.valid
    column: surface
    check: in
    value:
    - asphalt
    - cobblestone
    - compacted
    - concrete
    - concrete_plates
    - dirt
    - earth
    - fine_gravel
    - grass
    - gravel
    - ground
    - paved
    - paving_stones
    - pebblestone
    - recreation_grass
    - recreation_paved
    - recreation_sand
    - rubber
    - sand
    - sett
    - tartan
    - unpaved
    - wood
    - woodchips
    severity: error
  - name: infrastructure.names.primary.not_null
    column: names.primary
    check: not_null
    when:
      column: names
      check: not_null
    severity: error
  - name: infrastructure.names.primary.min_length
    column: names.primary
    check: min_length
    value: 1
    severity: error
  - name: infrastructure.names.primary.pattern
    column: names.primary
    check: pattern
    value: ^(\S.*)?\S$
    severity: error
  - name: infrastructure.names.rules.value.not_null
    column: names.rules.value
    check: not_null
    list_columns: &id003
    - names.rules
    when:
      column: names.rules
      check: not_null
    severity: error
  - name: infrastructure.names.rules.value.min_length
    column: names.rules.value
    check: min_length
    value: 1
    list_columns: &id002
    - names.rules
    severity: error
  - name: infrastructure.names.rules.value.pattern
    column: names.rules.value
    check: pattern
    value: ^(\S.*)?\S$
    list_columns: *id002
    severity: error
  - name: infrastructure.names.rules.variant.not_null
    column: names.rules.variant
    check: not_null
    list_columns: *id003
    when:
      column: names.rules
      check: not_null
    severity: error
  - name: infrastructure.names.rules.variant.valid
    column: names.rules.variant
    check: in
    value:
    - alternate
    - common
    - official
    - short
    list_columns:
    - names.rules
    severity: error
  - name: infrastructure.names.rules.language.pattern
    column: names.rules.language
    check: pattern
    value: ^(?:(?:[A-Za-z]{2,3}(?:-[A-Za-z]{3}){0,3}?)|(?:[A-Za-z]{4,8}))(?:-[A-Za-z]{4})?(?:-[A-Za-z]{2}|[0-9]{3})?(?:-(?:[A-Za-z0-9]{5,8}|[0-9][A-Za-z0-9]{3}))*(?:-[A-WY-Za-wy-z0-9](?:-[A-Za-z0-9]{2,8})+)*$
    list_columns:
    - names.rules
    severity: error
  - name: infrastructure.names.rules.perspectives.mode.not_null
    column: names.rules.perspectives.mode
    check: not_null
    list_columns: &id004
    - names.rules
    when:
      column: names.rules.perspectives
      check: not_null
    severity: error
  - name: infrastructure.names.rules.perspectives.mode.valid
    column: names.rules.perspectives.mode
    check: in
    value:
    - accepted_by
    - disputed_by
    list_columns:
    - names.rules
    severity: error
  - name: infrastructure.names.rules.perspectives.countries.not_null
    column: names.rules.perspectives.countries
    check: not_null
    list_columns: *id004
    when:
      column: names.rules.perspectives
      check: not_null
    severity: error
  - name: infrastructure.names.rules.perspectives.countries.min_list_length
    column: names.rules.perspectives.countries
    check: min_list_length
    value: 1
    list_columns: *id004
    severity: error
  - name: infrastructure.names.rules.perspectives.countries.pattern
    column: names.rules.perspectives.countries
    check: pattern
    value: ^[A-Z]{2}$
    list_columns:
    - names.rules
    - names.rules.perspectives.countries
    severity: error
  - name: infrastructure.names.rules.perspectives.countries.unique
    column: names.rules.perspectives.countries
    check: unique
    list_columns: *id004
    severity: error
  - name: infrastructure.names.rules.side.valid
    column: names.rules.side
    check: in
    value:
    - left
    - right
    list_columns:
    - names.rules
    severity: error
  - name: infrastructure.wikidata.pattern
    column: wikidata
    check: pattern
    value: ^Q\d+$
    severity: error
