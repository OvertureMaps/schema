version: '1'
datasets:
- name: division_area
  source_model: overture.schema.divisions.division_area.models.DivisionArea
  id_column: id
  rules:
  - name: division_area.names.not_null
    column: names
    check: not_null
    severity: error
  - name: division_area.names.primary.not_null
    column: names.primary
    check: not_null
    severity: error
  - name: division_area.names.primary.min_length
    column: names.primary
    check: min_length
    value: 1
    severity: error
  - name: division_area.names.primary.pattern
    column: names.primary
    check: pattern
    value: ^(\S.*)?\S$
    severity: error
  - name: division_area.names.rules.value.not_null
    column: names.rules.value
    check: not_null
    list_columns: &id002
    - names.rules
    when:
      column: names.rules
      check: not_null
    severity: error
  - name: division_area.names.rules.value.min_length
    column: names.rules.value
    check: min_length
    value: 1
    list_columns: &id001
    - names.rules
    severity: error
  - name: division_area.names.rules.value.pattern
    column: names.rules.value
    check: pattern
    value: ^(\S.*)?\S$
    list_columns: *id001
    severity: error
  - name: division_area.names.rules.variant.not_null
    column: names.rules.variant
    check: not_null
    list_columns: *id002
    when:
      column: names.rules
      check: not_null
    severity: error
  - name: division_area.names.rules.variant.valid
    column: names.rules.variant
    check: in
    value:
    - alternate
    - common
    - official
    - short
    list_columns:
    - names.rules
    severity: error
  - name: division_area.names.rules.language.pattern
    column: names.rules.language
    check: pattern
    value: ^(?:(?:[A-Za-z]{2,3}(?:-[A-Za-z]{3}){0,3}?)|(?:[A-Za-z]{4,8}))(?:-[A-Za-z]{4})?(?:-[A-Za-z]{2}|[0-9]{3})?(?:-(?:[A-Za-z0-9]{5,8}|[0-9][A-Za-z0-9]{3}))*(?:-[A-WY-Za-wy-z0-9](?:-[A-Za-z0-9]{2,8})+)*$
    list_columns:
    - names.rules
    severity: error
  - name: division_area.names.rules.perspectives.mode.not_null
    column: names.rules.perspectives.mode
    check: not_null
    list_columns: &id003
    - names.rules
    when:
      column: names.rules.perspectives
      check: not_null
    severity: error
  - name: division_area.names.rules.perspectives.mode.valid
    column: names.rules.perspectives.mode
    check: in
    value:
    - accepted_by
    - disputed_by
    list_columns:
    - names.rules
    severity: error
  - name: division_area.names.rules.perspectives.countries.not_null
    column: names.rules.perspectives.countries
    check: not_null
    list_columns: *id003
    when:
      column: names.rules.perspectives
      check: not_null
    severity: error
  - name: division_area.names.rules.perspectives.countries.min_list_length
    column: names.rules.perspectives.countries
    check: min_list_length
    value: 1
    list_columns: *id003
    severity: error
  - name: division_area.names.rules.perspectives.countries.pattern
    column: names.rules.perspectives.countries
    check: pattern
    value: ^[A-Z]{2}$
    list_columns:
    - names.rules
    - names.rules.perspectives.countries
    severity: error
  - name: division_area.names.rules.perspectives.countries.unique
    column: names.rules.perspectives.countries
    check: unique
    list_columns: *id003
    severity: error
  - name: division_area.names.rules.side.valid
    column: names.rules.side
    check: in
    value:
    - left
    - right
    list_columns:
    - names.rules
    severity: error
  - name: division_area.id.not_null
    column: id
    check: not_null
    severity: error
  - name: division_area.id.min_length
    column: id
    check: min_length
    value: 1
    severity: error
  - name: division_area.id.pattern
    column: id
    check: pattern
    value: ^\S+$
    severity: error
  - name: division_area.geometry.not_null
    column: geometry
    check: not_null
    severity: error
  - name: division_area.geometry.type
    column: geometry
    check: geometry_type
    value:
    - MultiPolygon
    - Polygon
    severity: error
  - name: division_area.version.not_null
    column: version
    check: not_null
    severity: error
  - name: division_area.version.gte
    column: version
    check: gte
    value: 0
    severity: error
  - name: division_area.sources.min_list_length
    column: sources
    check: min_list_length
    value: 1
    severity: error
  - name: division_area.sources.unique
    column: sources
    check: unique
    severity: error
  - name: division_area.sources.property.not_null
    column: sources.property
    check: not_null
    list_columns: &id004
    - sources
    when:
      column: sources
      check: not_null
    severity: error
  - name: division_area.sources.dataset.not_null
    column: sources.dataset
    check: not_null
    list_columns: *id004
    when:
      column: sources
      check: not_null
    severity: error
  - name: division_area.sources.license.pattern
    column: sources.license
    check: pattern
    value: ^(\S.*)?\S$
    list_columns:
    - sources
    severity: error
  - name: division_area.sources.confidence.range
    column: sources.confidence
    check: between
    value:
    - 0.0
    - 1.0
    list_columns:
    - sources
    severity: error
  - name: division_area.subtype.not_null
    column: subtype
    check: not_null
    severity: error
  - name: division_area.subtype.valid
    column: subtype
    check: in
    value:
    - borough
    - country
    - county
    - dependency
    - localadmin
    - locality
    - macrocounty
    - macrohood
    - macroregion
    - microhood
    - neighborhood
    - region
    severity: error
  - name: division_area.class.not_null
    column: class
    check: not_null
    severity: error
  - name: division_area.class.valid
    column: class
    check: in
    value:
    - land
    - maritime
    severity: error
  - name: division_area.division_id.not_null
    column: division_id
    check: not_null
    severity: error
  - name: division_area.division_id.min_length
    column: division_id
    check: min_length
    value: 1
    severity: error
  - name: division_area.division_id.pattern
    column: division_id
    check: pattern
    value: ^\S+$
    severity: error
  - name: division_area.country.not_null
    column: country
    check: not_null
    severity: error
  - name: division_area.country.pattern
    column: country
    check: pattern
    value: ^[A-Z]{2}$
    severity: error
  - name: division_area.region.pattern
    column: region
    check: pattern
    value: ^[A-Z]{2}-[A-Z0-9]{1,3}$
    severity: error
  - name: division_area.admin_level.range
    column: admin_level
    check: between
    value:
    - 0
    - 16
    severity: error
  - name: division_area.exactly_one_of
    columns:
    - is_land
    - is_territorial
    check: exactly_one_of
    severity: error
  - name: division_area.admin_level.required_when
    column: admin_level
    check: not_null
    when:
      column: subtype
      check: eq
      value: county
    severity: error
  - name: division_area.admin_level.required_when
    column: admin_level
    check: not_null
    when:
      column: subtype
      check: eq
      value: macrocounty
    severity: error
  - name: division_area.admin_level.required_when
    column: admin_level
    check: not_null
    when:
      column: subtype
      check: eq
      value: region
    severity: error
  - name: division_area.admin_level.required_when
    column: admin_level
    check: not_null
    when:
      column: subtype
      check: eq
      value: macroregion
    severity: error
  - name: division_area.admin_level.required_when
    column: admin_level
    check: not_null
    when:
      column: subtype
      check: eq
      value: dependency
    severity: error
  - name: division_area.admin_level.required_when
    column: admin_level
    check: not_null
    when:
      column: subtype
      check: eq
      value: country
    severity: error
