    value: 1
    severity: error
  - name: place.names.primary.pattern
    column: names.primary
    check: pattern
    value: ^(\S.*)?\S$
    severity: error
  - name: place.names.rules.value.not_null
    column: names.rules.value
    check: not_null
    list_columns: &id006
    - names.rules
    when:
      column: names.rules
      check: not_null
    severity: error
  - name: place.names.rules.value.min_length
    column: names.rules.value
    check: min_length
    value: 1
    list_columns: &id005
    - names.rules
