  - name: place.brand.names.rules.perspectives.countries.min_list_length
    column: brand.names.rules.perspectives.countries
    check: min_list_length
    value: 1
    list_columns: *id004
    severity: error
  - name: place.brand.names.rules.perspectives.countries.pattern
    column: brand.names.rules.perspectives.countries
    check: pattern
    value: ^[A-Z]{2}$
    list_columns:
    - brand.names.rules
    - brand.names.rules.perspectives.countries
    severity: error
  - name: place.brand.names.rules.perspectives.countries.unique
    column: brand.names.rules.perspectives.countries
    check: unique
    list_columns: *id004
    severity: error
  - name: place.brand.names.rules.side.valid
    column: brand.names.rules.side
    check: in
    value:
