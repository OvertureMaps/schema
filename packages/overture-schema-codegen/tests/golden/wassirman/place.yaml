version: '1'
datasets:
- name: place
  source_model: overture.schema.places.place.Place
  id_column: id
  rules:
  - name: place.id.not_null
    column: id
    check: not_null
    severity: error
  - name: place.id.min_length
    column: id
    check: min_length
    value: 1
    severity: error
  - name: place.id.pattern
    column: id
    check: pattern
    value: ^\S+$
    severity: error
  - name: place.geometry.not_null
    column: geometry
    check: not_null
    severity: error
  - name: place.geometry.type
    column: geometry
    check: geometry_type
    value:
    - Point
    severity: error
  - name: place.version.not_null
    column: version
    check: not_null
    severity: error
  - name: place.version.gte
    column: version
    check: gte
    value: 0
    severity: error
  - name: place.sources.min_list_length
    column: sources
    check: min_list_length
    value: 1
    severity: error
  - name: place.sources.unique
    column: sources
    check: unique
    severity: error
  - name: place.sources.property.not_null
    column: sources.property
    check: not_null
    list_columns: &id001
    - sources
    when:
      column: sources
      check: not_null
    severity: error
  - name: place.sources.dataset.not_null
    column: sources.dataset
    check: not_null
    list_columns: *id001
    when:
      column: sources
      check: not_null
    severity: error
  - name: place.sources.license.pattern
    column: sources.license
    check: pattern
    value: ^(\S.*)?\S$
    list_columns:
    - sources
    severity: error
  - name: place.sources.confidence.range
    column: sources.confidence
    check: between
    value:
    - 0.0
    - 1.0
    list_columns:
    - sources
    severity: error
  - name: place.operating_status.not_null
    column: operating_status
    check: not_null
    severity: error
  - name: place.operating_status.valid
    column: operating_status
    check: in
    value:
    - open
    - permanently_closed
    - temporarily_closed
    severity: error
  - name: place.categories.primary.not_null
    column: categories.primary
    check: not_null
    when:
      column: categories
      check: not_null
    severity: error
  - name: place.categories.primary.pattern
    column: categories.primary
    check: pattern
    value: ^[a-z0-9]+(_[a-z0-9]+)*$
    severity: error
  - name: place.categories.alternate.pattern
    column: categories.alternate
    check: pattern
    value: ^[a-z0-9]+(_[a-z0-9]+)*$
    list_columns:
    - categories.alternate
    severity: error
  - name: place.categories.alternate.unique
    column: categories.alternate
    check: unique
    severity: error
  - name: place.basic_category.pattern
    column: basic_category
    check: pattern
    value: ^[a-z0-9]+(_[a-z0-9]+)*$
    severity: error
  - name: place.taxonomy.primary.not_null
    column: taxonomy.primary
    check: not_null
    when:
      column: taxonomy
      check: not_null
    severity: error
  - name: place.taxonomy.primary.pattern
    column: taxonomy.primary
    check: pattern
    value: ^[a-z0-9]+(_[a-z0-9]+)*$
    severity: error
  - name: place.taxonomy.hierarchy.not_null
    column: taxonomy.hierarchy
    check: not_null
    when:
      column: taxonomy
      check: not_null
    severity: error
  - name: place.taxonomy.hierarchy.min_list_length
    column: taxonomy.hierarchy
    check: min_list_length
    value: 1
    severity: error
  - name: place.taxonomy.hierarchy.pattern
    column: taxonomy.hierarchy
    check: pattern
    value: ^[a-z0-9]+(_[a-z0-9]+)*$
    list_columns:
    - taxonomy.hierarchy
    severity: error
  - name: place.taxonomy.hierarchy.unique
    column: taxonomy.hierarchy
    check: unique
    severity: error
  - name: place.taxonomy.alternates.min_list_length
    column: taxonomy.alternates
    check: min_list_length
    value: 1
    severity: error
  - name: place.taxonomy.alternates.pattern
    column: taxonomy.alternates
    check: pattern
    value: ^[a-z0-9]+(_[a-z0-9]+)*$
    list_columns:
    - taxonomy.alternates
    severity: error
  - name: place.taxonomy.alternates.unique
    column: taxonomy.alternates
    check: unique
    severity: error
  - name: place.confidence.range
    column: confidence
    check: between
    value:
    - 0.0
    - 1.0
    severity: error
  - name: place.websites.min_list_length
    column: websites
    check: min_list_length
    value: 1
    severity: error
  - name: place.websites.unique
    column: websites
    check: unique
    severity: error
  - name: place.socials.min_list_length
    column: socials
    check: min_list_length
    value: 1
    severity: error
  - name: place.socials.unique
    column: socials
    check: unique
    severity: error
  - name: place.emails.min_list_length
    column: emails
    check: min_list_length
    value: 1
    severity: error
  - name: place.emails.unique
    column: emails
    check: unique
    severity: error
  - name: place.phones.min_list_length
    column: phones
    check: min_list_length
    value: 1
    severity: error
  - name: place.phones.pattern
    column: phones
    check: pattern
    value: ^\+\d{1,3}[\s\-\(\)0-9]+$
    list_columns:
    - phones
    severity: error
  - name: place.phones.unique
    column: phones
    check: unique
    severity: error
  - name: place.brand.names.primary.not_null
    column: brand.names.primary
    check: not_null
    when:
      column: brand.names
      check: not_null
    severity: error
  - name: place.brand.names.primary.min_length
    column: brand.names.primary
    check: min_length
    value: 1
    severity: error
  - name: place.brand.names.primary.pattern
    column: brand.names.primary
    check: pattern
    value: ^(\S.*)?\S$
    severity: error
  - name: place.brand.names.rules.value.not_null
    column: brand.names.rules.value
    check: not_null
    list_columns: &id003
    - brand.names.rules
    when:
      column: brand.names.rules
      check: not_null
    severity: error
  - name: place.brand.names.rules.value.min_length
    column: brand.names.rules.value
    check: min_length
    value: 1
    list_columns: &id002
    - brand.names.rules
    severity: error
  - name: place.brand.names.rules.value.pattern
    column: brand.names.rules.value
    check: pattern
    value: ^(\S.*)?\S$
    list_columns: *id002
    severity: error
  - name: place.brand.names.rules.variant.not_null
    column: brand.names.rules.variant
    check: not_null
    list_columns: *id003
    when:
      column: brand.names.rules
      check: not_null
    severity: error
  - name: place.brand.names.rules.variant.valid
    column: brand.names.rules.variant
    check: in
    value:
    - alternate
    - common
    - official
    - short
    list_columns:
    - brand.names.rules
    severity: error
  - name: place.brand.names.rules.language.pattern
    column: brand.names.rules.language
    check: pattern
    value: ^(?:(?:[A-Za-z]{2,3}(?:-[A-Za-z]{3}){0,3}?)|(?:[A-Za-z]{4,8}))(?:-[A-Za-z]{4})?(?:-[A-Za-z]{2}|[0-9]{3})?(?:-(?:[A-Za-z0-9]{5,8}|[0-9][A-Za-z0-9]{3}))*(?:-[A-WY-Za-wy-z0-9](?:-[A-Za-z0-9]{2,8})+)*$
    list_columns:
    - brand.names.rules
    severity: error
  - name: place.brand.names.rules.perspectives.mode.not_null
    column: brand.names.rules.perspectives.mode
    check: not_null
    list_columns: &id004
    - brand.names.rules
    when:
      column: brand.names.rules.perspectives
      check: not_null
    severity: error
  - name: place.brand.names.rules.perspectives.mode.valid
    column: brand.names.rules.perspectives.mode
    check: in
    value:
    - accepted_by
    - disputed_by
    list_columns:
    - brand.names.rules
    severity: error
  - name: place.brand.names.rules.perspectives.countries.not_null
    column: brand.names.rules.perspectives.countries
    check: not_null
    list_columns: *id004
    when:
      column: brand.names.rules.perspectives
      check: not_null
