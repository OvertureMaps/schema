[project]
maintainers = [
    {name = "Overture Maps Schema Working Group"},
]
dependencies = ["overture-schema-common", "overture-schema-system", "pydantic>=2.13.0"]
description = "Add your description here"
version = "0.1.1"
license = "MIT"
name = "overture-schema-annex"
readme = "README.md"
requires-python = ">=3.10"

[tool.uv.sources]
overture-schema-common = { workspace = true }
overture-schema-system = { workspace = true }

[project.urls]
Homepage = "https://overturemaps.org"
Source = "https://github.com/OvertureMaps/schema"
Issues = "https://github.com/OvertureMaps/schema/issues"

[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]

[project.entry-points."overture.models"]
sources = "overture.schema.annex:Sources"

[project.entry-points.pytest11]
overture_baselines = "overture.schema.system.testing.plugin"

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
