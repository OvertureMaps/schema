[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "overture-schema-validation"
dynamic = ["version"]
description = "Validation rule IR for Overture Maps schema"
license = "MIT"
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "click>=8.0",
    "overture-schema-core",
    "overture-schema-system",
]

[project.optional-dependencies]
duckdb = ["duckdb>=1.0"]

[tool.uv.sources]
overture-schema-core = { workspace = true }
overture-schema-system = { workspace = true }

[tool.hatch.version]
path = "src/overture/schema/validation/__about__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]

[project.scripts]
overture-schema-validation = "overture.schema.validation.cli:cli"
