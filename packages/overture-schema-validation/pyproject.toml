[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "overture-schema-validation"
dynamic = ["version"]
description = "Validation rule IR for Overture Maps schema"
license = "MIT"
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
]

[tool.hatch.version]
path = "src/overture/schema/validation/__about__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]
