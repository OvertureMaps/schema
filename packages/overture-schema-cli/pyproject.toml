[project]
maintainers = [
    {name = "Overture Maps Schema Working Group"},
]
dependencies = [
    "overture-schema-common",
    "overture-schema-system",
    "pydantic>=2.12.0",
    "pyyaml>=6.0.2",
    "click>=8.1",
    "rich>=13.0",
    "yamlcore>=0.0.4",
]
description = "Command-line interface for Overture Maps schema validation and JSON Schema generation"
dynamic = ["version"]
license = "MIT"
name = "overture-schema-cli"
readme = "README.md"
requires-python = ">=3.10"

[project.urls]
Homepage = "https://overturemaps.org"
Source = "https://github.com/OvertureMaps/schema"
Issues = "https://github.com/OvertureMaps/schema/issues"

[tool.uv.sources]
overture-schema-common = { workspace = true }
overture-schema-system = { workspace = true }

[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[dependency-groups]
dev = [
    "pytest>=9.0.0",
    "ruff>=0.13.0",
    "mypy>=1.17.0",
]

[tool.hatch.version]
path = "src/overture/schema/cli/__about__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]

[project.scripts]
overture-schema = "overture.schema.cli:cli"
