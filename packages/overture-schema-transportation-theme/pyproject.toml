[project]
maintainers = [
    {name = "Overture Maps Schema Working Group"},
]
dependencies = [
    "overture-schema-common",
    "overture-schema-system",
    "pydantic>=2.12.0",
]
description = "Overture Maps transportation theme with shared structures and connector and segment types"
version = "0.1.1"
license = "MIT"
name = "overture-schema-transportation-theme"
readme = "README.md"
requires-python = ">=3.10"

[project.urls]
Homepage = "https://overturemaps.org"
Source = "https://github.com/OvertureMaps/schema"
Issues = "https://github.com/OvertureMaps/schema/issues"

[tool.uv.sources]
overture-schema-common = { workspace = true }
overture-schema-system = { workspace = true }


[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]

[project.entry-points."overture.models"]
connector = "overture.schema.transportation:Connector"
segment = "overture.schema.transportation:Segment"

[project.entry-points.pytest11]
overture_baselines = "overture.schema.system.testing.plugin"

[[examples.Connector]]
id = "39542bee-230f-4b91-b7e5-a9b58e0c59b1"
geometry = "POINT (-176.5472979 -43.9679472)"
version = 1
theme = "transportation"
type = "connector"

[examples.Connector.bbox]
xmin = -176.54730224609375
xmax = -176.54727172851562
ymin = -43.96794891357422
ymax = -43.96794128417969

[[examples.Connector.sources]]
property = ""
dataset = "OpenStreetMap"

[[examples.Segment]]
id = "1bc62f3b-08b5-42b8-89fe-36f685f60455"
geometry = "LINESTRING (-176.5636191 -43.954404, -176.5643637 -43.9538145, -176.5647264 -43.9535274, -176.5649947 -43.953251)"
version = 1
subtype = "road"
class = "residential"
theme = "transportation"
type = "segment"

[examples.Segment.bbox]
