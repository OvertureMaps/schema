---
id: overture:transportation:segment:example:speed-limits
type: Feature
geometry:
  type: LineString
  coordinates: [[0, 0], [1, 0]]
properties:
  theme: transportation
  type: segment
  subtype: road
  class: tertiary
  version: 3
  speed_limits:
    - type: maximum
      speed: {value: 20, unit: 'km/h'}
      between: [ 0, 0.5 ]
    - type: minimum
      speed: {value: 25, unit: 'mph'}
      when:
        during: PH
    - type: maximum
      speed: {value: 100, unit: 'km/h'}
      when: {heading: forward}
    - type: minimum
      speed: {value: 75, unit: 'km/h'}
      when: {heading: forward}
    - type: minimum
      speed: {value: 25, unit: 'mph'}
      when:
        heading: forward
        mode: [car, hgv]
    - type: maximum
      speed: {value: 60, unit: 'mph'}
      when:
        heading: forward
        using: [at_destination]
    - type: advisory
      speed: {value: 45, unit: 'mph'}
      between: [ 0.5, 1 ]
    - type: minimum
      speed: {value: 25, unit: 'mph'}
      when:
        heading: forward
        recognized: [as_employee]
    - type: minimum
      speed: {value: 40, unit: 'mph'}
      when:
        heading: forward
        vehicle:
          - dimension: axle_count
            comparison: less_than
            value: 3
          - dimension: weight
            comparison: less_than_equal
            value: 600
            unit: 'kg'
          - dimension: height
            comparison: less_than
            value: 12
            unit: 'ft'
    - type: maximum
      speed: {value: 30, unit: 'km/h'}
      between: [0.25, 0.5]
      when:
        heading: forward
        during: PH
        mode: [car, hgv]
        using: [at_destination]
        recognized: [as_employee]
        vehicle:
          - dimension: axle_count
            comparison: less_than
            value: 3
          - dimension: weight
            comparison: less_than_equal
            value: 600
            unit: 'kg'
          - dimension: height
            comparison: less_than
            value: 12
            unit: 'ft'
