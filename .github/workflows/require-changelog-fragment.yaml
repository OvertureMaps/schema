name: Changelog fragment verification

# Enforces the version/changelog lock-step: any PR that bumps a package's
# <major>.<minor> in pyproject.toml must also carry that package's changelog
# update: either a new towncrier fragment under changelog.d/, or a built
# CHANGELOG.md (the result of running `uvx towncrier build`).
#
# Patch-only changes and non-version pyproject edits are exempt: the patch
# component is computed by CI, not by humans (see docs/versioning.md).

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-fragment:
    name: Require changelog on version bump
    runs-on: ubuntu-latest
    permissions:
      contents: read # Read pyproject.toml at base/head
      pull-requests: read # List PR files
    steps:
      - name: Require a changelog update for each bumped package
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner, repo, pull_number: pr.number, per_page: 100,
            });

            const majorMinor = async (ref, path) => {
              try {
                const res = await github.rest.repos.getContent({ owner, repo, path, ref });
                const content = Buffer.from(res.data.content, 'base64').toString('utf-8');
                const match = content.match(/^version\s*=\s*["']([^"']+)["']/m);
                if (!match) return null;
                const [major, minor] = match[1].split('.');
                return `${parseInt(major, 10)}.${parseInt(minor, 10)}`;
              } catch (err) {
                if (err.status === 404) return null;
                throw err;
              }
            };

            const fragmentPattern = pkg =>
              new RegExp(`^packages/${pkg}/changelog\\.d/.+\\.(breaking|feature|bugfix|docs|misc)\\.md$`);

            const bumpedPyprojects = files.filter(f =>
              /^packages\/[^/]+\/pyproject\.toml$/.test(f.filename));

            const missing = [];
            for (const file of bumpedPyprojects) {
              const pkg = file.filename.split('/')[1];
              const before = await majorMinor(pr.base.sha, file.filename);
              const after = await majorMinor(pr.head.sha, file.filename);

              // Only a major/minor change on an existing package is a release.
              if (!before || !after || before === after) continue;

              const hasChangelog = files.some(f => f.filename === `packages/${pkg}/CHANGELOG.md`);
              const hasFragment = files.some(f =>
                f.status === 'added' && fragmentPattern(pkg).test(f.filename));

              if (!hasChangelog && !hasFragment) {
                missing.push(`\`${pkg}\` (${before} → ${after})`);
              }
            }

            if (missing.length > 0) {
              core.setFailed(
                `These packages bump major/minor but include no changelog update:\n` +
                missing.map(m => `  - ${m}`).join('\n') + `\n\n` +
                `Add a towncrier fragment at packages/<package>/changelog.d/<id>.<type>.md ` +
                `(type: breaking | feature | bugfix | docs | misc), then run ` +
                `\`uvx towncrier build --config pyproject.toml --dir packages/<package>\` to fold it into CHANGELOG.md. ` +
                `See docs/versioning.md.`
              );
            } else {
              core.info('Changelog fragment check passed.');
            }
