---
name: Schema PR Preview
run-name: Build and deploy schema reference preview for PR #${{ github.event.number }}

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

env:
  STAGING_URL: https://staging.overturemaps.org
  PREVIEW_PATH: /schema/pr/${{ github.event.number }}
  SCHEMA_PREVIEW: 'true'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      DOCS_PATH: _docs
    steps:
      - name: Check out schema repo
        uses: actions/checkout@v6

      - name: Check out docs repo
        uses: actions/checkout@v6
        with:
          repository: OvertureMaps/docs
          path: ${{ env.DOCS_PATH }}
          ref: jmccall-schema-docs-builds # TODO: Remove before merging

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ${{ env.DOCS_PATH }}/package.json

      - name: Configure sustainable npm
        uses: lowlydba/sustainable-npm@ed089bd92235c2af803a951fba2bd42c59fbcd73 # v2.0.0

      - name: Install NPM dependencies
        working-directory: ${{ env.DOCS_PATH }}
        run: npm ci --omit=dev

      - name: Generate schema markdown docs
        uses: OvertureMaps/workflows/.github/actions/generate-schema-docs@main
        with:
          output-dir: ${{ github.workspace }}/${{ env.DOCS_PATH }}/docs/schema/reference
          schema-path: .
          skip-checkout: 'true' # Repo is already checked out at root, and action defaults to looking there

      - name: Build Docusaurus site
        working-directory: ${{ env.DOCS_PATH }}
        run: npm run build
        env:
          DOCUSAURUS_URL: ${{ env.STAGING_URL }}/
          DOCUSAURUS_BASE_URL: ${{ env.PREVIEW_PATH }}/
          SCHEMA_PREVIEW: ${{ env.SCHEMA_PREVIEW }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-artifact
          path: ${{ env.DOCS_PATH }}/build

  deploy:
    name: Deploy
    runs-on: ubuntu-slim
    needs: build
    permissions:
      id-token: write
      pull-requests: write
    env:
      AWS_ROLE_ARN: arn:aws:iam::763944545891:role/pages-staging-oidc-overturemaps
      AWS_REGION: us-west-2
    environment:
      name: staging
      url: ${{ env.STAGING_URL }}${{ env.PREVIEW_PATH }}/schema/index.html

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download build artifact
        uses: actions/download-artifact@v7
        with:
          name: build-artifact
          path: build

      - name: Copy to S3
        run: |
          aws s3 sync --delete --quiet build \
            s3://overture-managed-staging-usw2/gh-pages${{ env.PREVIEW_PATH }}/

      - name: Bust the cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E1KP2IN0H2RGGT \
            --paths "${{ env.PREVIEW_PATH }}/*"

      - name: Get deploy timestamp
        id: timestamp
        run: echo "time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
        with:
          message: |
            ## 🗺️ Schema reference docs preview is live!

            | | |
            |---|---|
            | **Preview** | ${{ env.STAGING_URL }}${{ env.PREVIEW_PATH }}/schema/index.html |
            | **Build scope** | `SCHEMA_PREVIEW=${{ env.SCHEMA_PREVIEW }}` |
            | **Updated** | ${{ steps.timestamp.outputs.time }} |
            | **Commit** | [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |

            > [!NOTE]
            > This preview updates automatically with each push to this PR.
