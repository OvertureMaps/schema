name: Release trigger

# Runs on every push to main that touches any package's pyproject.toml.
# For each package whose <major>.<minor> was bumped, cuts a published GitHub
# Release tagged `<package>-v<major>.<minor>.0`, titled `` `<package>` <version> ``,
# with notes taken from that package's CHANGELOG.md section.
#
# Packages version independently (see docs/versioning.md). The umbrella
# `overture-schema` release is marked "Latest"; all others are not.
#
# Release notes come from towncrier: a release PR bumps the version and runs
# `uvx towncrier build`, folding that package's changelog.d/ fragments into its
# CHANGELOG.md (reviewed in the PR). This workflow reads back the section.
#
# Patch-only changes are ignored: the patch component is computed by CI (see
# .github/actions/compute-version), not by this workflow.
#
# NOTE: releases are created with GITHUB_TOKEN, which by design does NOT trigger
# further workflow runs. The Phase 3 publish workflow (#509) must therefore be
# triggered by an app/PAT token here or via repository_dispatch, a plain
# `on: release: published` listener will not fire for these releases.

on:
  push:
    branches: [main]
    paths:
      - packages/*/pyproject.toml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release-trigger:
    name: Detect version bumps
    if: github.event.repository.full_name == github.repository
    runs-on: ubuntu-slim
    permissions:
      contents: write # Required to create releases and their tags
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect version bumps
        id: detect
        env:
          BEFORE: ${{ github.event.before }}
        run: python3 ./.github/workflows/scripts/detect_version_bumps.py

      - name: Create releases
        if: steps.detect.outputs.count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET: ${{ github.event.after }}
          UMBRELLA: overture-schema
        run: |
          set -euo pipefail

          while IFS=$'\t' read -r package version tag; do
            [ -z "$package" ] && continue

            if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "::error::Release ${tag} already exists. A duplicate ${package} ${version} bump landed on main; investigate before re-releasing."
              exit 1
            fi

            notes=$(python3 ./.github/workflows/scripts/extract_release_notes.py "$version" "packages/${package}/CHANGELOG.md")
            if [ -z "$notes" ]; then
              notes="Release ${version} of \`${package}\`. No changelog section was found; add towncrier fragments under \`packages/${package}/changelog.d\` and run \`uvx towncrier build --config pyproject.toml --dir packages/${package}\`."
            fi
            printf '%s\n' "$notes" > "${RUNNER_TEMP}/notes.md"

            latest="--latest=false"
            [ "$package" = "$UMBRELLA" ] && latest="--latest"

            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$TARGET" \
              --title "\`${package}\` ${version}" \
              --notes-file "${RUNNER_TEMP}/notes.md" \
              $latest

            {
              echo "## 📦 Released \`${package}\` ${version}"
              echo ""
              echo "Tag \`${tag}\`: published GitHub Release."
            } >> "$GITHUB_STEP_SUMMARY"
          done < "${RUNNER_TEMP}/bumps.tsv"
